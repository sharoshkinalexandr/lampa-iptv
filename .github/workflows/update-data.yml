name: Safe public source health

on:
  schedule:
    - cron: '17 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: safe-public-source-health
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Check repository allowlist only
        run: npm run check:streams
      - name: Commit changed health data
        shell: bash
        run: |
          if git diff --quiet -- public/data/health.json; then
            echo "No health changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/health.json
          git commit -m "chore(data): update safe public health"
          git push
