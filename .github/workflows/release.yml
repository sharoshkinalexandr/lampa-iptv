name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run validate
      - name: Resolve release version
        id: version
        shell: bash
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          echo "tag=v${PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Check whether release already exists
        id: existing
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Create archives
        if: steps.existing.outputs.exists == 'false'
        shell: bash
        run: |
          zip -j "lampa-iptv-${{ steps.version.outputs.tag }}.zip" \
            dist/plugin.js dist/plugin.min.js dist/plugin.css dist/plugin.min.css \
            dist/manifest.json dist/version.json dist/SHA256SUMS.txt
          tar -czf "lampa-iptv-${{ steps.version.outputs.tag }}.tar.gz" -C dist \
            plugin.js plugin.min.js plugin.css plugin.min.css \
            manifest.json version.json SHA256SUMS.txt
      - name: Publish GitHub Release
        if: steps.existing.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${{ steps.version.outputs.tag }}"
          dist/plugin.js
          dist/plugin.min.js
          dist/plugin.css
          dist/plugin.min.css
          dist/manifest.json
          dist/version.json
          dist/SHA256SUMS.txt
          "lampa-iptv-${{ steps.version.outputs.tag }}.zip"
          "lampa-iptv-${{ steps.version.outputs.tag }}.tar.gz"
          --target "${GITHUB_SHA}"
          --title "Lampa IPTV ${{ steps.version.outputs.tag }}"
          --generate-notes
