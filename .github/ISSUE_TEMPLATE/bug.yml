name: Ошибка
description: Сообщить о воспроизводимой ошибке без публикации приватных IPTV-данных
title: '[Bug]: '
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Не прикладывайте логины, пароли, cookies, токены, приватные M3U или подписанные URL.
  - type: input
    id: version
    attributes:
      label: Версия
      description: Версия из раздела «Диагностика»
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Платформа
      options:
        - Android TV
        - Браузер
        - Tizen
        - webOS
        - Другая
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Шаги воспроизведения
      description: Используйте обезличенные example.com URL.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Ожидаемый результат
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Фактический результат
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Конфиденциальность
      options:
        - label: Я удалил(а) credentials и приватные URL.
          required: true
